<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner - Multi-Agent LangGraph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Inter'] text-slate-800 antialiased selection:bg-blue-200">
    <div class="min-h-screen">
        <!-- Header Section -->
        <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-10 text-center py-6 border-b border-slate-200">
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 tracking-tight">TravelPlanner AI</h1>
            <p class="text-slate-500 mt-2 text-sm font-medium tracking-wide">Multi-Agent LangGraph Powered Itineraries</p>
        </header>

        <main class="max-w-4xl mx-auto px-4 py-10">
            <!-- Form Input Card -->
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-10 mb-10 transition-all hover:shadow-2xl">
                <form id="trip-form" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label for="destination" class="block text-sm font-semibold text-slate-700">Destination</label>
                            <input type="text" id="destination" required placeholder="e.g., Italy, Japan, Paris" 
                                class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-0 ring-1 ring-slate-200 hover:ring-slate-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        </div>
                        <div class="space-y-3">
                            <label for="days" class="block text-sm font-semibold text-slate-700">Duration (Days)</label>
                            <input type="number" id="days" required min="1" max="30" placeholder="e.g., 5"
                                class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-0 ring-1 ring-slate-200 hover:ring-slate-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                        </div>
                        <div class="space-y-3">
                            <label for="budget" class="block text-sm font-semibold text-slate-700">Budget</label>
                            <select id="budget" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-0 ring-1 ring-slate-200 hover:ring-slate-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none cursor-pointer">
                                <option value="budget">Budget-Friendly</option>
                                <option value="medium" selected>Moderate</option>
                                <option value="luxury">Luxury</option>
                            </select>
                        </div>
                        <div class="space-y-3">
                            <label for="travel_style" class="block text-sm font-semibold text-slate-700">Travel Style</label>
                            <select id="travel_style" class="w-full px-5 py-3.5 rounded-2xl bg-slate-50 border-0 ring-1 ring-slate-200 hover:ring-slate-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none cursor-pointer">
                                <option value="relaxed">Relaxed</option>
                                <option value="adventure" selected>Adventure</option>
                                <option value="cultural">Cultural</option>
                                <option value="family">Family</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" id="submit-btn" 
                        class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 px-8 rounded-2xl hover:from-blue-700 hover:to-indigo-700 transition-all transform active:scale-[0.98] shadow-lg shadow-blue-500/30 flex justify-center items-center gap-3">
                        <span class="text-lg">Generate Trip Plan</span>
                        <svg class="w-5 h-5 hidden" id="spinner" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                    <div id="loading-msg" class="hidden text-center text-sm font-medium text-slate-500 animate-pulse mt-4">
                        Our AI Agents are collaborating to plan your trip...
                    </div>
                </form>
            </div>

            <!-- Results Section -->
            <div id="results-container" class="hidden space-y-8 animate-fade-in">
                <!-- Destinations Card -->
                <section class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden transform hover:-translate-y-1 transition-transform duration-300">
                    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border-b border-blue-100 p-6">
                        <h2 class="text-xl font-bold text-blue-900 flex items-center gap-3">
                            <span class="text-2xl">📍</span> Destinations & Attractions
                        </h2>
                    </div>
                    <div class="p-6 md:p-8">
                        <div id="destinations-list" class="flex flex-wrap gap-2 mb-8"></div>
                        <div id="attractions-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                        <div class="mt-8 p-5 bg-slate-50 rounded-2xl text-sm italic text-slate-600 border border-slate-200">
                            <strong class="text-slate-800 not-italic mr-1">Agent Reasoning:</strong> <span id="reasoning"></span>
                        </div>
                    </div>
                </section>

                <!-- Itinerary Card -->
                <section class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden transform hover:-translate-y-1 transition-transform duration-300">
                    <div class="bg-gradient-to-r from-indigo-50 to-purple-50 border-b border-indigo-100 p-6">
                        <h2 class="text-xl font-bold text-indigo-900 flex items-center gap-3">
                            <span class="text-2xl">📅</span> Day-by-Day Itinerary
                        </h2>
                    </div>
                    <div class="p-6 md:p-8">
                        <div id="itinerary-list" class="space-y-8 border-l-2 border-indigo-200 pl-6 ml-3"></div>
                    </div>
                </section>

                <!-- Budget Card -->
                <section class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden transform hover:-translate-y-1 transition-transform duration-300">
                    <div class="bg-gradient-to-r from-emerald-50 to-teal-50 border-b border-emerald-100 p-6">
                        <h2 class="text-xl font-bold text-emerald-900 flex items-center gap-3">
                            <span class="text-2xl">💰</span> Estimated Budget
                        </h2>
                    </div>
                    <div class="p-6 md:p-8">
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8" id="budget-breakdown"></div>
                        <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100 hidden" id="tips-container">
                            <h3 class="font-bold text-slate-800 mb-4 text-xs uppercase tracking-widest flex items-center gap-2">
                                <span class="text-yellow-500 text-base">💡</span> Money Saving Tips
                            </h3>
                            <ul id="budget-tips" class="space-y-3 text-slate-600 text-sm list-none"></ul>
                        </div>
                    </div>
                </section>
            </div>
            
            <div id="error-container" class="hidden mt-8 p-6 bg-red-50 text-red-700 border border-red-200 rounded-3xl text-center font-medium shadow-sm">
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
